      font-weight: 600;
      color: #ccc;
      transition: all .2s;

      margin-bottom: 20px;
    }

      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 1rem;
    }

      width: 100%;
      padding: 12px 16px 12px 40px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border .2s;
      background: #fff;
    }
    #search:focus { border-color: #fdbd13; }
    .stats {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
    }
    .stats span { color: #c99000; font-weight: 700; }
    .table-wrap {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
    }

      width: 100%;
      border-collapse: collapse;
    }

      background: #fdbd13;
      color: #1a1a1a;
      padding: 13px 16px;
      text-align: left;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    thead th:last-child { text-align: center; width: 130px; }
    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fffbee; }
    td {
      padding: 11px 16px;
      font-size: 0.92rem;
      vertical-align: middle;
    }
    td:last-child {
      text-align: center;
      font-weight: 700;
    }
    .rate-badge {
      display: inline-block;
      background: #fdbd13;
      color: #1a1a1a;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.88rem;
      min-width: 54px;
    }
    .rate-badge.zero {
      background: #ccc;
    }
    .cat-label {
      display: inline-block;
      background: #fef8e0;
      color: #c99000;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .sub-text {
      color: #555;
      font-size: 0.88rem;
    }
    .note {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
      font-style: italic;
    }

      color: #aaa;

      display: none;
